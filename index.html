<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 にゃんこのポモドーロ</title>
<style>
:root {
  --g1:#4ade80;--g2:#22c55e;--g3:#16a34a;--g4:#86efac;
  --text:#14532d;--muted:#4d7c60;--card:rgba(255,255,255,0.86);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 16px 30px;color:var(--text);overflow-x:hidden;}

.forest-bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,#87ceeb 0%,#b0e8a0 52%,#4a9c30 52%,#3a7a22 100%);overflow:hidden;}
.ground{position:absolute;bottom:0;left:0;width:200%;height:48%;
  background:repeating-linear-gradient(90deg,#4a8c30 0,#4a8c30 60px,#3d7a28 60px,#3d7a28 120px);
  animation:scrollGnd 8s linear infinite;}
@keyframes scrollGnd{to{transform:translateX(-50%);}}
.trees{position:absolute;bottom:45%;left:0;width:200%;height:200px;animation:scrollT 12s linear infinite;}
.trees2{position:absolute;bottom:47%;left:0;width:200%;height:130px;animation:scrollT 22s linear infinite;opacity:.65;}
@keyframes scrollT{to{transform:translateX(-50%);}}
.cloud{position:absolute;background:rgba(255,255,255,.82);border-radius:999px;animation:scrollCld linear infinite;}
@keyframes scrollCld{from{transform:translateX(110vw)}to{transform:translateX(-30vw)}}

.ui{position:relative;z-index:20;display:flex;flex-direction:column;align-items:center;width:100%;}
.title-block{margin:10px 0 14px;text-align:center;}
.title-block h1{font-size:1.3rem;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.35);letter-spacing:1px;}
.title-block p{font-size:.75rem;color:rgba(255,255,255,.85);}

.card{background:var(--card);border-radius:22px;backdrop-filter:blur(8px);
  box-shadow:0 4px 24px rgba(0,0,0,.12);padding:18px 22px;width:100%;max-width:340px;margin-bottom:12px;}

.tabs{display:flex;gap:6px;margin-bottom:16px;justify-content:center;}
.tab{padding:5px 13px;border-radius:999px;border:2px solid var(--g1);
  background:white;color:var(--text);font-size:.75rem;cursor:pointer;transition:all .2s;}
.tab.active{background:var(--g1);font-weight:bold;}

.ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 16px;}
svg.ring{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#d1fae5;stroke-width:13;}
.ring-fg{fill:none;stroke:var(--g2);stroke-width:13;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear,stroke .4s;}
#catOnRing{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.timer-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.timer-digits{font-size:2.6rem;font-weight:bold;letter-spacing:2px;line-height:1;color:var(--g3);}
.mode-label{font-size:.7rem;color:var(--muted);margin-top:4px;}

.controls{display:flex;gap:10px;margin-bottom:14px;justify-content:center;}
.btn{padding:9px 24px;border-radius:999px;border:none;font-size:.95rem;font-weight:bold;cursor:pointer;transition:all .15s;}
.btn-start{background:var(--g2);color:white;}
.btn-start:hover{background:var(--g3);}
.btn-reset{background:white;color:var(--muted);border:2px solid var(--g1);}

.settings-toggle{font-size:.75rem;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;margin-bottom:6px;display:block;text-align:center;}
.settings-panel{display:none;}
.settings-panel.open{display:block;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.setting-item label{font-size:.7rem;color:var(--muted);display:block;margin-bottom:2px;}
.setting-item input[type=number]{width:100%;padding:6px 8px;border-radius:10px;
  border:2px solid var(--g1);font-size:.9rem;text-align:center;outline:none;}
.setting-item input:focus{border-color:var(--g3);}
.apply-btn{margin-top:10px;width:100%;padding:7px;border-radius:12px;border:none;
  background:var(--g2);color:white;font-weight:bold;font-size:.85rem;cursor:pointer;}

.stats-row{display:flex;justify-content:space-around;margin-bottom:8px;}
.stat{text-align:center;}
.stat-num{font-size:1.5rem;font-weight:bold;}
.stat-lbl{font-size:.7rem;color:var(--muted);}
.tomato-row{font-size:1.1rem;letter-spacing:2px;min-height:1.4rem;text-align:center;}

.todo-header{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.todo-add{display:flex;gap:6px;margin-bottom:10px;}
.todo-input{flex:1;padding:8px 12px;border-radius:12px;border:2px solid var(--g1);
  font-size:.88rem;color:var(--text);outline:none;background:white;}
.todo-input:focus{border-color:var(--g3);}
.todo-add-btn{padding:8px 14px;border-radius:12px;border:none;background:var(--g2);
  color:white;font-weight:bold;font-size:.88rem;cursor:pointer;}
.todo-list{list-style:none;max-height:180px;overflow-y:auto;}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 4px;
  border-bottom:1px solid #d1fae5;cursor:pointer;}
.todo-item:last-child{border-bottom:none;}
.todo-item.selected{background:#f0fdf4;border-radius:8px;}
.todo-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--g2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.7rem;}
.todo-item.done .todo-check{background:var(--g2);color:white;}
.todo-text{flex:1;font-size:.88rem;transition:all .2s;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
.todo-sel-dot{width:8px;height:8px;border-radius:50%;background:var(--g2);flex-shrink:0;opacity:0;}
.todo-item.selected .todo-sel-dot{opacity:1;}
.todo-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:.9rem;padding:2px 4px;}
.todo-del:hover{color:#f87171;}
.todo-hint{font-size:.7rem;color:var(--muted);margin-top:6px;text-align:center;}
.clear-btn{font-size:.7rem;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:6px;display:block;}
</style>
</head>
<body>

<div class="forest-bg">
  <div class="ground"></div>
  <div class="trees"  id="trees"></div>
  <div class="trees2" id="trees2"></div>
  <div id="clouds"></div>
</div>

<!-- にゃー音声 -->
<audio id="meowAudio" src="meow.m4a" preload="auto"></audio>

<div class="ui">
  <div class="title-block">
    <h1>🍅 にゃんこのポモドーロ</h1>
    <p>集中して、ちゃんと休もう</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-work"  onclick="setMode('work')">作業</button>
      <button class="tab"        id="tab-short" onclick="setMode('short')">小休憩</button>
      <button class="tab"        id="tab-long"  onclick="setMode('long')">長休憩</button>
    </div>

    <div class="ring-wrap">
      <svg class="ring" width="200" height="200" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="87"/>
        <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="87" stroke-dasharray="547" stroke-dashoffset="0"/>
      </svg>
      <svg id="catOnRing" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <text id="catEmoji" text-anchor="middle" dominant-baseline="middle" font-size="24" x="0" y="0">🐱</text>
      </svg>
      <div class="timer-display">
        <div class="timer-digits" id="digits">25:00</div>
        <div class="mode-label"   id="modeLabel">作業タイム</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">▶ スタート</button>
      <button class="btn btn-reset" onclick="resetTimer()">↺</button>
    </div>

    <button class="settings-toggle" onclick="toggleSettings()">⚙ 時間を設定する</button>
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-grid">
        <div class="setting-item"><label>作業（分）</label><input type="number" id="setWork"  min="1" max="60" value="25"></div>
        <div class="setting-item"><label>小休憩（分）</label><input type="number" id="setShort" min="1" max="30" value="5"></div>
        <div class="setting-item"><label>長休憩（分）</label><input type="number" id="setLong"  min="1" max="60" value="15"></div>
      </div>
      <button class="apply-btn" onclick="applySettings()">✔ 適用する</button>
    </div>
  </div>

  <div class="card">
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="countNum" style="color:var(--g2)">0</div><div class="stat-lbl">ポモドーロ</div></div>
      <div class="stat"><div class="stat-num" id="focusMin" style="color:var(--g3)">0</div><div class="stat-lbl">分 集中</div></div>
    </div>
    <div class="tomato-row" id="tomatoRow"></div>
    <button class="clear-btn" onclick="resetCount()">🍅 カウントをリセット</button>
  </div>

  <div class="card">
    <div class="todo-header">📋 Todoリスト</div>
    <div class="todo-add">
      <input class="todo-input" id="todoInput" type="text" placeholder="タスクを追加..." maxlength="40"
        onkeydown="if(event.key==='Enter')addTodo()">
      <button class="todo-add-btn" onclick="addTodo()">＋</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
    <div class="todo-hint">タップで今やるタスクを選択 ✔ で完了</div>
    <button class="clear-btn" onclick="clearDone()">完了済みを削除</button>
  </div>
</div>

<script>
// ── Forest ──
function drawTrees(el,count,minH,maxH,minW,maxW){
  const greens=['#2d6a2d','#3a8a3a','#256025','#4ca64c','#1e5c1e'];
  let h='';
  for(let i=0;i<count;i++){
    const th=minH+Math.random()*(maxH-minH),tw=minW+Math.random()*(maxW-minW);
    const x=(i/count)*100,c=greens[Math.floor(Math.random()*greens.length)];
    h+=`<svg style="position:absolute;bottom:0;left:${x}%;overflow:visible" width="${tw}" height="${th}" viewBox="0 0 ${tw} ${th}">
      <polygon points="${tw/2},0 ${tw},${th*.6} ${tw*.7},${th*.6} ${tw*.7},${th} ${tw*.3},${th} ${tw*.3},${th*.6} 0,${th*.6}" fill="${c}"/>
    </svg>`;
  }
  el.innerHTML=h+h;
}
drawTrees(document.getElementById('trees'),18,80,180,30,55);
drawTrees(document.getElementById('trees2'),22,50,110,20,38);
(function(){
  const w=document.getElementById('clouds');
  for(let i=0;i<5;i++){
    const d=document.createElement('div');d.className='cloud';
    const top=2+Math.random()*22,cw=60+Math.random()*80,dur=18+Math.random()*20,delay=-Math.random()*dur;
    d.style.cssText=`top:${top}%;width:${cw}px;height:${cw*.4}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
    w.appendChild(d);
  }
})();

// ── Web Worker (Blob) ──
const workerCode=`
  let interval=null;
  self.onmessage=function(e){
    if(e.data==='start'){
      if(interval) clearInterval(interval);
      interval=setInterval(()=>self.postMessage('tick'),1000);
    } else if(e.data==='stop'){
      clearInterval(interval); interval=null;
    }
  };
`;
const worker=new Worker(URL.createObjectURL(new Blob([workerCode],{type:'application/javascript'})));
worker.onmessage=()=>tick();

// ── Timer state ──
let cfg={work:25,short:5,long:15};
const MODES={
  work: {label:'作業タイム',  stroke:'#22c55e',cat:'🐱'},
  short:{label:'小休憩☕',    stroke:'#4ade80',cat:'😸'},
  long: {label:'のんびり休憩',stroke:'#86efac',cat:'😻'},
};
const CIRC=2*Math.PI*87;
let mode='work',totalSec=cfg.work*60,remaining=totalSec;
let running=false,sessionSet=0,orbitDeg=0;

try{const sc=JSON.parse(localStorage.getItem('pomo_cfg')||'null');
  if(sc){cfg=sc;totalSec=cfg.work*60;remaining=totalSec;
    document.getElementById('setWork').value=cfg.work;
    document.getElementById('setShort').value=cfg.short;
    document.getElementById('setLong').value=cfg.long;}}catch{}

const TODAY=new Date().toISOString().slice(0,10);
function loadDay(){try{return JSON.parse(localStorage.getItem('pomo_data')||'{}')[TODAY]||{count:0};}catch{return{count:0};}}
function saveDay(d){try{const a=JSON.parse(localStorage.getItem('pomo_data')||'{}');a[TODAY]=d;localStorage.setItem('pomo_data',JSON.stringify(a));}catch{}}
let dayData=loadDay();

// ── Todo ──
function loadTodos(){try{return JSON.parse(localStorage.getItem('pomo_todos')||'[]');}catch{return[];}}
function saveTodos(){localStorage.setItem('pomo_todos',JSON.stringify(todos));}
let todos=loadTodos();
let selectedId=null;

// ── Sound ──
function playMeow(){
  const a=document.getElementById('meowAudio');
  a.currentTime=0;
  a.play().catch(()=>{});
}
function playDone(){
  playMeow();
}

// ── Display ──
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
const R=87,CX=100,CY=100;
function placeCat(deg){
  const rad=(deg-90)*Math.PI/180;
  const el=document.getElementById('catEmoji');
  el.textContent=MODES[mode].cat;
  el.setAttribute('x',CX+R*Math.cos(rad));
  el.setAttribute('y',CY+R*Math.sin(rad));
}
function updateRing(){
  document.getElementById('ringFg').style.strokeDashoffset=CIRC*(1-remaining/totalSec);
  document.getElementById('ringFg').style.stroke=MODES[mode].stroke;
}
function updateDisplay(){
  document.getElementById('digits').textContent=fmt(remaining);
  document.getElementById('modeLabel').textContent=MODES[mode].label;
  updateRing();placeCat(orbitDeg);
}
function updateStats(){
  document.getElementById('countNum').textContent=dayData.count;
  document.getElementById('focusMin').textContent=dayData.count*cfg.work;
  document.getElementById('tomatoRow').textContent='🍅'.repeat(Math.min(dayData.count,12));
}

// ── Timer ──
function setMode(m){
  if(running)return;
  mode=m;totalSec=cfg[m]*60;remaining=totalSec;orbitDeg=0;
  ['work','short','long'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('active',k===m));
  document.getElementById('startBtn').textContent='▶ スタート';
  updateDisplay();
}
function unlockAudio(){
  // iPhoneのSafari対策：タップ時に一度無音再生して解除
  const a=document.getElementById('meowAudio');
  a.volume=0;
  a.play().then(()=>{ a.pause(); a.currentTime=0; a.volume=1; }).catch(()=>{ a.volume=1; });
}
function toggleTimer(){
  if(running){
    worker.postMessage('stop');running=false;
    document.getElementById('startBtn').textContent='▶ 再開';
  }else{
    unlockAudio();
    running=true;
    document.getElementById('startBtn').textContent='⏸ 一時停止';
    worker.postMessage('start');
  }
}
function tick(){
  if(!running)return;
  remaining--;
  orbitDeg=(orbitDeg+6)%360;
  updateDisplay();
  if(remaining<=0){worker.postMessage('stop');running=false;onComplete();}
}
function resetTimer(){
  worker.postMessage('stop');running=false;remaining=totalSec;orbitDeg=0;
  document.getElementById('startBtn').textContent='▶ スタート';
  updateDisplay();
}
function onComplete(){
  playDone();
  if(mode==='work'){
    sessionSet++;dayData.count++;
    saveDay(dayData);updateStats();
    setTimeout(()=>{if(sessionSet>=4){setMode('long');sessionSet=0;}else setMode('short');},1200);
  }else{
    setTimeout(()=>setMode('work'),1200);
  }
}

// ── Settings ──
function toggleSettings(){document.getElementById('settingsPanel').classList.toggle('open');}
function applySettings(){
  const w=parseInt(document.getElementById('setWork').value)||25;
  const s=parseInt(document.getElementById('setShort').value)||5;
  const l=parseInt(document.getElementById('setLong').value)||15;
  cfg={work:Math.min(60,Math.max(1,w)),short:Math.min(30,Math.max(1,s)),long:Math.min(60,Math.max(1,l))};
  localStorage.setItem('pomo_cfg',JSON.stringify(cfg));
  document.getElementById('settingsPanel').classList.remove('open');
  if(!running){totalSec=cfg[mode]*60;remaining=totalSec;updateDisplay();}
  updateStats();
  document.getElementById('tab-work').textContent=`作業 ${cfg.work}分`;
  document.getElementById('tab-short').textContent=`小休憩 ${cfg.short}分`;
      document.getElementById('tab-long').textContent=`長休憩 ${cfg.long}分`;
}

// ── Todo ──
function renderTodos(){
  const ul=document.getElementById('todoList');ul.innerHTML='';
  todos.forEach(t=>{
    const li=document.createElement('li');
    li.className='todo-item'+(t.done?' done':'')+(t.id===selectedId&&!t.done?' selected':'');
    li.innerHTML=`<div class="todo-sel-dot"></div>
      <div class="todo-check" onclick="toggleDone('${t.id}',event)">${t.done?'✓':''}</div>
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}',event)">✕</button>`;
    if(!t.done)li.onclick=()=>selectTodo(t.id);
    ul.appendChild(li);
  });
}
function escHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function addTodo(){
  const inp=document.getElementById('todoInput'),text=inp.value.trim();
  if(!text)return;
  todos.push({id:Date.now().toString(),text,done:false});
  saveTodos();inp.value='';renderTodos();
}
function selectTodo(id){selectedId=(selectedId===id?null:id);renderTodos();}
function toggleDone(id,e){
  e.stopPropagation();
  const t=todos.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  if(t.done){playMeow();if(selectedId===id)selectedId=null;}
  saveTodos();renderTodos();
}
function deleteTodo(id,e){
  e.stopPropagation();
  todos=todos.filter(x=>x.id!==id);if(selectedId===id)selectedId=null;
  saveTodos();renderTodos();
}
function resetCount(){
  if(!confirm('今日のポモドーロ数をリセットしますか？'))return;
  dayData.count=0;saveDay(dayData);updateStats();
}
function clearDone(){todos=todos.filter(x=>!x.done);saveTodos();renderTodos();}

// Init
updateDisplay();updateStats();renderTodos();
</script>
</body>
</html>
